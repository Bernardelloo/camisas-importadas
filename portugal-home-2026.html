<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Portugal Home 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    font-family: 'Poppins', sans-serif;
    background:#f2f2f2;
    margin:0;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.produto{
    display:flex;
    flex-wrap:wrap;
    gap:50px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.imagem{
    flex:1;
    text-align:center;
}

.imagem img{
    width:100%;
    max-width:400px;
}

.info{
    flex:1;
}

h1{
    margin-top:0;
    font-size:32px;
}

.descricao{
    color:#666;
    margin-bottom:20px;
}

.preco{
    font-size:32px;
    font-weight:700;
    margin-bottom:20px;
}

.tamanhos{
    display:flex;
    gap:10px;
    margin-bottom:30px;
}

.tamanhos button{
    border:1px solid #ccc;
    background:white;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:500;
}

.tamanhos button:hover{
    border:1px solid black;
}

.comprar{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:16px 30px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    font-size:18px;
    transition:0.2s;
}

.comprar:hover{
    background:#1ebe5d;
}

.voltar{
    margin-bottom:20px;
}

.voltar a{
    text-decoration:none;
    color:#333;
}

</style>

</head>

<body>

<div class="container">

<div class="voltar">
<a href="home.html">⬅ Voltar</a>
</div>

<div class="produto">

<div class="imagem">
<img id="imagem-principal" src="img/selecoes/portugal/portugal_home_2026_1.png">

<div class="miniaturas">

<img src="img/selecoes/portugal/portugal_home_2026_1.png" onclick="trocarImagem(this)">

<img src="img/selecoes/portugal/portugal_home_2026_2.png" onclick="trocarImagem(this)">

</div>

<div class="info">

<h1>Portugal Home 2026</h1>

<p class="descricao">
Camisa versão torcedor importada.  
Alta qualidade, escudo bordado e tecido respirável.
</p>

<div class="preco">
R$149,00
</div>

<p><strong>Tamanhos disponíveis:</strong></p>

<div class="tamanhos">
<button>P</button>
<button>M</button>
<button>G</button>
<button>GG</button>
</div>

<a class="comprar"
href="https://wa.me/5511957944391?text=Olá!%20Quero%20a%20camisa%20Portugal%20Home%202026">
Comprar no WhatsApp
</a>

</div>

</div>

</div>
<script>
function trocarImagem(elemento){
document.getElementById("imagem-principal").src = elemento.src;
}
</script>
</body>
</html>
