<!DOCTYPE html>

<html lang="pt-BR">

<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">
<div class="logo">Camisas Importadas</div>

<ul class="menu">
<li><a href="home.html">Início</a></li>

<h1 class="titulo">São Paulo FC</h1>

<div class="produtos-grid" id="produtos"></div>

<script>

const camisas = [

{
nome: "São Paulo Home 2025",
imagem: "img/brasileiros/sao_paulo/sp_home_2025_1.png",
link: "saopaulo-home-2025.html"
},

{
nome: "São Paulo Away 2025",
imagem: "img/brasileiros/sao_paulo/sp_away_2025_1.png",
link: "saopaulo-away-2025.html"
}

];

const container = document.getElementById("produtos");

camisas.forEach(camisa => {

container.innerHTML += `
<a href="${camisa.link}">
<div class="card-camisa">

<img src="${camisa.imagem}">

<p>${camisa.nome}</p>

</div>
</a>
`;

});

</script>
<header class="banner-time">
<h1>São Paulo FC</h1>
</header>
</body>
</html>
